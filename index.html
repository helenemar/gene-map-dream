        <h1>Genogy — Créez votre génogramme en ligne</h1>
        <p>Genogy est l'outil en ligne pour créer des génogrammes professionnels. Conçu pour les psychologues, thérapeutes familiaux, éducateurs spécialisés et travailleurs sociaux. Gratuit pendant la bêta.</p>

        <h2>Pourquoi faire un génogramme avec Genogy ?</h2>
        <ul>
          <li><strong>Création de génogramme simplifiée</strong> — Créez un génogramme complet en quelques clics : ajoutez des membres, des relations et des pathologies sans perdre de temps.</li>
          <li><strong>Génogramme 100 % en ligne</strong> — Accédez à votre génogramme en ligne depuis n'importe quel ordinateur ou tablette. Aucune installation, aucun logiciel à télécharger.</li>
          <li><strong>Liens émotionnels et pathologies</strong> — Représentez les liens émotionnels (fusionnel, conflictuel, coupure…), les pathologies médicales et les notes cliniques selon les standards McGoldrick.</li>
          <li><strong>Partage et export de génogrammes</strong> — Exportez vos génogrammes en PDF ou PNG, partagez-les avec vos collègues via un lien sécurisé.</li>
        </ul>

        <h2>Comment faire un génogramme en ligne ?</h2>
        <ol>
          <li><strong>Créez votre compte</strong> — Inscrivez-vous en quelques secondes et accédez immédiatement à l'éditeur de génogrammes.</li>
          <li><strong>Construisez votre génogramme</strong> — Ajoutez les membres de la famille, définissez les unions, les enfants, les pathologies et les liens émotionnels.</li>
          <li><strong>Partagez et exportez</strong> — Exportez votre génogramme en PDF, partagez-le en lecture seule ou en mode collaboratif.</li>
        </ol>

        <h2>Qu'est-ce qu'un génogramme et pourquoi en créer un ?</h2>
        <p>Un génogramme est une représentation graphique avancée de l'arbre familial d'un individu. Contrairement à un simple arbre généalogique, le génogramme cartographie les relations émotionnelles, les pathologies, les événements marquants et les dynamiques intergénérationnelles.</p>
        <p>Genogy est un site web de génogramme en ligne conçu pour les psychologues cliniciens, éducateurs spécialisés, thérapeutes familiaux, assistants sociaux et tout professionnel du médico-social.</p>
        <p>Faire un génogramme permet de mieux comprendre les contextes de vie, de repérer les transmissions transgénérationnelles et de visualiser les schémas relationnels.</p>

        <h2>À qui s'adresse cet outil de génogramme ?</h2>
        <ul>
          <li>Psychologues cliniciens</li>
          <li>Thérapeutes familiaux et systémiciens</li>
          <li>Éducateurs spécialisés</li>
          <li>Assistants sociaux</li>
          <li>Professionnels de santé mentale</li>
          <li>Étudiants en travail social ou psychologie</li>
        </ul>

        <h2>Questions fréquentes sur les génogrammes</h2>
        <h3>Qu'est-ce qu'un génogramme ?</h3>
        <p>Un génogramme est une représentation graphique de la structure familiale d'un individu sur plusieurs générations. Il va au-delà de l'arbre généalogique classique en incluant les relations émotionnelles, les pathologies médicales et les dynamiques intergénérationnelles.</p>
        <h3>Comment faire un génogramme en ligne ?</h3>
        <p>Avec Genogy, créer un génogramme en ligne est simple : inscrivez-vous, ajoutez les membres de la famille, définissez les unions et les enfants, puis enrichissez le génogramme avec les liens émotionnels et les pathologies.</p>
        <h3>Genogy est-il gratuit ?</h3>
        <p>Genogy est actuellement en phase bêta et accessible gratuitement. Des abonnements payants seront introduits à la fin de la bêta.</p>
        <h3>Quelle est la différence entre un génogramme et un arbre généalogique ?</h3>
        <p>Un arbre généalogique montre uniquement la filiation biologique. Un génogramme représente aussi les liens émotionnels, les pathologies médicales, les événements de vie et les schémas transgénérationnels.</p>
        <h3>Quels symboles sont utilisés dans un génogramme ?</h3>
        <p>Genogy utilise les symboles standardisés de McGoldrick : carrés pour les hommes, cercles pour les femmes, croix pour les décès, lignes pleines pour les unions, et des tracés spécifiques pour les liens émotionnels.</p>
